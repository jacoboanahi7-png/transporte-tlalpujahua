<!DOCTYPE html>
<html>
<head>

    <title>Acceso Conductores</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>


<body>
    

<div class="header">
<div class="menu-superior">
    <a href="/" class="volver-link">
        🏠 Volver al sitio público
    </a>
</div>
    Acceso de Conductores
</div>


<div class="tarjeta">
    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}
    <form method="POST">

        <p>Usuario</p>

        <input
            type="text"
            name="usuario"
            required
        >

        <p>Contraseña</p>

        <input
            type="password"
            name="password"
            required
        >

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

</div>

</body>
</html>
